name: Build Windows Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-windows.txt

      - name: Build Windows app
        run: python tools/build_windows_exe.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $compiler)) {
            $compiler = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (!(Test-Path $compiler)) {
            throw "Inno Setup compiler not found"
          }
          & $compiler windows_installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: FingerprintBrowserWindowsSetup
          path: installer_dist/FingerprintBrowserWindowsSetup.exe
          if-no-files-found: error
