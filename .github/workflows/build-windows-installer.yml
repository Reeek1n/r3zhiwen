name: Build Windows Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python --version
          python -m pip --version
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows.txt
          python -m pip list

      - name: Build Windows app
        shell: pwsh
        run: |
          Get-ChildItem -Force
          Get-ChildItem tools -Force
          python -m py_compile tools/build_windows_exe.py tools/create_windows_profiles.py tools/windows_manager.py
          python -u tools/build_windows_exe.py
          Get-ChildItem dist_windows -Recurse -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $compiler)) {
            $compiler = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (!(Test-Path $compiler)) {
            throw "Inno Setup compiler not found"
          }
          & $compiler windows_installer.iss
          Get-ChildItem installer_dist -Force

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: FingerprintBrowserWindowsSetup
          path: installer_dist/FingerprintBrowserWindowsSetup.exe
          if-no-files-found: error

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-diagnostics
          path: |
            build_windows/
            dist_windows/
            installer_dist/
            windows_manager.spec
          if-no-files-found: ignore
